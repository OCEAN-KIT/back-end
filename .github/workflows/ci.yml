name: CI

on:
  pull_request:
    branches:
      - dev
      - main

  push:
    branches:
      - dev
      - main

  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  JAVA_VERSION: "21"

jobs:
  build:
    name: Build executable jar
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build executable jar
        run: ./gradlew --no-daemon clean bootJar -x test

      - name: Verify executable jar
        run: |
          mapfile -t JARS < <(find build/libs -maxdepth 1 -type f -name "*.jar" ! -name "*plain*" | sort)

          if [ "${#JARS[@]}" -eq 0 ]; then
            echo "No executable jar found under build/libs"
            exit 1
          fi

          if [ "${#JARS[@]}" -gt 1 ]; then
            echo "Multiple executable jars found. Refusing ambiguous build result."
            printf '%s\n' "${JARS[@]}"
            exit 1
          fi

          echo "Executable jar verified: ${JARS[0]}"