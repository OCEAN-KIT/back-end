# --- Server ---
server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=framework
server.use-forward-headers=true
server.servlet.session.cookie.secure=true

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# --- Database ---
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# --- JPA ---
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.defer-datasource-initialization=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database=postgresql
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# --- JWT ---
jwt.secret=${JWT_SECRET}
jwt.expiration.access=${JWT_EXPIRATION_ACCESS:315360000000}

# --- Optional OAuth2 ---
app.oauth2.enabled=${APP_OAUTH2_ENABLED:false}

# --- AWS / S3 ---
aws.region=${AWS_REGION:ap-northeast-2}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME}
aws.s3.project-folder-name=${AWS_S3_PROJECT_FOLDER_NAME:public}
aws.s3.user-objects-directory=${AWS_S3_USER_OBJECTS_DIRECTORY:user_objects}
aws.s3.expiration-time=${AWS_S3_EXPIRATION_TIME:1800}

# --- Cookie ---
app.cookie.domain=${APP_COOKIE_DOMAIN:}
app.cookie.secure=${APP_COOKIE_SECURE:true}
app.cookie.same-site=${APP_COOKIE_SAME_SITE:None}

# --- Logging ---
logging.level.root=INFO
logging.level.com.ocean.piuda=INFO